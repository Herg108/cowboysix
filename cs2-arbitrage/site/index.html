<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>cowboysix</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0a0f;
            color: #e0e0e0;
        }
        .header {
            padding: 2rem 2rem 1rem;
            border-bottom: 1px solid #1a1a2e;
        }
        .header h1 { font-size: 1.5rem; font-weight: 600; color: #fff; }
        .header p { color: #888; margin-top: 0.3rem; font-size: 0.9rem; }

        .browser {
            display: flex;
            height: calc(100vh - 90px);
        }

        /* Sidebar */
        .sidebar {
            width: 300px;
            min-width: 300px;
            border-right: 1px solid #1a1a2e;
            overflow-y: auto;
            background: #0d0d15;
        }
        .sidebar-section {
            border-bottom: 1px solid #1a1a2e;
        }
        .sidebar-header {
            padding: 0.8rem 1rem;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: #555;
            background: #0a0a12;
        }
        .sidebar-item {
            padding: 0.7rem 1rem;
            cursor: pointer;
            font-size: 0.85rem;
            border-bottom: 1px solid #111;
            transition: background 0.15s;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .sidebar-item:hover { background: #15152a; }
        .sidebar-item.active { background: #1a1a3a; color: #4fc3f7; }
        .sidebar-item .count {
            font-size: 0.7rem;
            color: #555;
            background: #1a1a2e;
            padding: 2px 6px;
            border-radius: 3px;
        }
        .sidebar-item.active .count { color: #4fc3f7; background: #1a2a4e; }

        .date-item { font-weight: 600; }
        .match-item { padding-left: 1.5rem; }
        .match-item .match-name {
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 200px;
        }

        /* Map tabs */
        .map-tabs {
            display: flex;
            gap: 0;
            background: #0d0d15;
            border-bottom: 1px solid #1a1a2e;
            padding: 0 1rem;
        }
        .map-tab {
            padding: 0.6rem 1.2rem;
            cursor: pointer;
            font-size: 0.8rem;
            color: #888;
            border-bottom: 2px solid transparent;
            transition: all 0.15s;
            text-transform: uppercase;
            font-weight: 600;
            letter-spacing: 0.05em;
        }
        .map-tab:hover { color: #ccc; }
        .map-tab.active { color: #4fc3f7; border-bottom-color: #4fc3f7; }

        /* Main content */
        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .chart-frame {
            flex: 1;
            border: none;
            background: #fff;
        }
        .empty-state {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: #444;
            gap: 0.5rem;
        }
        .empty-state .icon { font-size: 3rem; opacity: 0.3; }
        .empty-state p { font-size: 0.9rem; }

        /* Collapsed dates */
        .date-matches { display: none; }
        .date-matches.open { display: block; }
        .date-item .arrow {
            transition: transform 0.2s;
            font-size: 0.6rem;
            color: #555;
        }
        .date-item.open .arrow { transform: rotate(90deg); }

        /* Scrollbar */
        .sidebar::-webkit-scrollbar { width: 6px; }
        .sidebar::-webkit-scrollbar-track { background: transparent; }
        .sidebar::-webkit-scrollbar-thumb { background: #2a2a3e; border-radius: 3px; }
    </style>
</head>
<body>
    <div class="header">
        <h1>cowboysix</h1>
        <p>speed i need this</p>
    </div>
    <div class="browser">
        <div class="sidebar" id="sidebar">
            <div style="padding: 1rem; color: #555; font-size: 0.85rem;">Loading data...</div>
        </div>
        <div class="main" id="main">
            <div class="empty-state">
                <div class="icon">📊</div>
                <p>Select a match from the sidebar to view charts</p>
            </div>
        </div>
    </div>

    <script>
        // Data structure built by scanning the data/ directory
        // We'll load this via a small JSON endpoint or inline it

        const DATA_BASE = 'data';
        let matchData = {}; // { "2026-03-20": { "faze_vs_tyloo": ["map1", "map2", "map3"], ... }, ... }
        let currentMatch = null;
        let currentMap = null;

        async function loadIndex() {
            // Fetch the directory listing by trying to load index.json
            // If it doesn't exist, we'll build it from known structure
            try {
                const resp = await fetch(`data/index.json`);
                if (resp.ok) {
                    matchData = await resp.json();
                    renderSidebar();
                    return;
                }
            } catch(e) {}

            // Fallback: try to load via the file list
            document.getElementById('sidebar').innerHTML =
                '<div style="padding: 1rem; color: #888; font-size: 0.8rem;">' +
                'Run <code style="color: #4fc3f7;">python3 build_index.py</code> to build the site data.' +
                '</div>';
        }

        function renderSidebar() {
            const sidebar = document.getElementById('sidebar');
            let html = '';

            // Sort dates descending (newest first)
            const dates = Object.keys(matchData).sort().reverse();

            for (const date of dates) {
                const matches = matchData[date];
                const matchNames = Object.keys(matches);
                const dateDisplay = formatDate(date);

                html += `<div class="sidebar-section">`;
                html += `<div class="sidebar-item date-item" onclick="toggleDate(this)" data-date="${date}">`;
                html += `<span>${dateDisplay}</span>`;
                html += `<span style="display:flex;align-items:center;gap:6px;">`;
                html += `<span class="count">${matchNames.length} match${matchNames.length !== 1 ? 'es' : ''}</span>`;
                html += `<span class="arrow">▶</span>`;
                html += `</span>`;
                html += `</div>`;
                html += `<div class="date-matches" data-date="${date}">`;

                for (const match of matchNames) {
                    const maps = matches[match];
                    const displayName = formatMatchName(match);
                    html += `<div class="sidebar-item match-item" onclick="selectMatch('${date}', '${match}')" data-match="${date}/${match}">`;
                    html += `<span class="match-name" title="${displayName}">${displayName}</span>`;
                    html += `<span class="count">${maps.length} map${maps.length !== 1 ? 's' : ''}</span>`;
                    html += `</div>`;
                }

                html += `</div></div>`;
            }

            sidebar.innerHTML = html;

            // Auto-expand the most recent date
            if (dates.length > 0) {
                const first = sidebar.querySelector('.date-item');
                if (first) toggleDate(first);
            }
        }

        function toggleDate(el) {
            const date = el.dataset.date;
            const matches = document.querySelector(`.date-matches[data-date="${date}"]`);
            const isOpen = matches.classList.contains('open');

            if (isOpen) {
                matches.classList.remove('open');
                el.classList.remove('open');
            } else {
                matches.classList.add('open');
                el.classList.add('open');
            }
        }

        function selectMatch(date, match) {
            currentMatch = `${date}/${match}`;
            const maps = matchData[date][match];

            // Highlight active match
            document.querySelectorAll('.match-item').forEach(el => el.classList.remove('active'));
            const active = document.querySelector(`.match-item[data-match="${date}/${match}"]`);
            if (active) active.classList.add('active');

            // Show map tabs + first map
            showMapTabs(date, match, maps);
            selectMap(date, match, maps[0]);
        }

        function showMapTabs(date, match, maps) {
            const main = document.getElementById('main');

            let tabsHtml = '<div class="map-tabs" id="mapTabs">';
            for (const map of maps) {
                tabsHtml += `<div class="map-tab" data-map="${map}" onclick="selectMap('${date}', '${match}', '${map}')">${map}</div>`;
            }
            tabsHtml += '</div>';

            main.innerHTML = tabsHtml + '<iframe class="chart-frame" id="chartFrame"></iframe>';
        }

        function selectMap(date, match, map) {
            currentMap = map;

            // Highlight active tab
            document.querySelectorAll('.map-tab').forEach(el => el.classList.remove('active'));
            const active = document.querySelector(`.map-tab[data-map="${map}"]`);
            if (active) active.classList.add('active');

            // Load chart
            const frame = document.getElementById('chartFrame');
            if (frame) {
                frame.src = `${DATA_BASE}/${date}/${match}/${map}/chart.html`;
            }
        }

        function formatDate(dateStr) {
            const [y, m, d] = dateStr.split('-');
            const months = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];
            return `${months[parseInt(m) - 1]} ${parseInt(d)}, ${y}`;
        }

        function formatMatchName(match) {
            return match.replace(/_/g, ' ').replace(/\bvs\b/g, 'vs').replace(/\b\w/g, c => c.toUpperCase());
        }

        // Keyboard navigation
        document.addEventListener('keydown', (e) => {
            if (!currentMatch) return;
            const tabs = document.querySelectorAll('.map-tab');
            if (tabs.length === 0) return;

            const currentIdx = Array.from(tabs).findIndex(t => t.classList.contains('active'));

            if (e.key === 'ArrowLeft' && currentIdx > 0) {
                tabs[currentIdx - 1].click();
            } else if (e.key === 'ArrowRight' && currentIdx < tabs.length - 1) {
                tabs[currentIdx + 1].click();
            }
        });

        loadIndex();
    </script>
</body>
</html>
